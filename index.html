<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ကျွန်တော့်ရဲ့ Website အသစ်</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 300px;
        }
        h1 {
            color: #007bff;
        }
        p {
            color: #555;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>မင်္ဂလာပါ!</h1>
        <p>ဒါကတော့ ကျွန်တော် Webli နဲ့ GitHub သုံးပြီး ကိုယ်တိုင်ရေးထားတဲ့ ပထမဆုံး Website လေးဖြစ်ပါတယ်။</p>
        <a href="#" class="btn">ဆက်လက်လေ့လာရန်</a>
    </div>

</body>
</html>
